# fly.dev.toml — Development environment Fly.io config
# Used by .github/workflows/dev-deploy.yml (deploys from the 'develop' branch)
# App name differs from production (legato-pit) to keep envs isolated.

app = 'legato-pit-dev'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[processes]
  app = "gunicorn --workers=2 --timeout=120 --bind=0.0.0.0:8000 main:app"

[env]
  FLASK_ENV = 'development'
  PORT = '8000'
  FLY_VOLUME_PATH = '/data'

[mounts]
  source = 'legato_data_dev'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    tls_skip_verify = false

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
