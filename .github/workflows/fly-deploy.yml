name: Fly Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      FLASK_ENV: testing
      FLASK_SECRET_KEY: ci-test-secret-key-not-for-production
      TESTING: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -r src/requirements.txt
          uv pip install --system pytest pytest-flask
          uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy Legato.Pit
    runs-on: ubuntu-latest
    needs: test
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Verify deployment health
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 15

          APP_URL="https://legato-pit.fly.dev"
          MAX_ATTEMPTS=5
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."
            if curl -sf "${APP_URL}/health" > /dev/null 2>&1; then
              echo "Application is healthy!"
              exit 0
            fi
            echo "Waiting 10 seconds..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Warning: Health check did not pass after $MAX_ATTEMPTS attempts"
          echo "Check logs with: fly logs --app legato-pit"
