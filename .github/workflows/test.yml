name: Test & Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv pip install --system ruff

      - name: Run ruff
        run: ruff check src/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    env:
      # Minimal env — no real keys needed for smoke tests
      FLASK_ENV: testing
      FLASK_SECRET_KEY: ci-test-secret-key-not-for-production
      TESTING: "true"
      # Suppress Stripe/OpenAI/etc. init errors by leaving them unset
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install app dependencies
        run: uv pip install --system -r src/requirements.txt

      - name: Install dev dependencies
        run: uv pip install --system pytest pytest-flask

      - name: Install package (editable)
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
